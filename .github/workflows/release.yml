name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win
            artifact: windows
          - os: ubuntu-latest
            target: linux
            artifact: linux
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Verify tag version
        shell: bash
        run: node -e "const p=require('./package.json'); if ('v'+p.version !== process.env.GITHUB_REF_NAME) process.exit(1)"

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build installers
        run: npm run dist:${{ matrix.target }}

      - name: Collect release files
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          path: |
            release/*.exe
            release/*.blockmap
            release/*.AppImage
            release/*.deb
            release/latest*.yml

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download release files
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Publish GitHub Release
        shell: bash
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --draft --verify-tag --generate-notes --title "Sonido ${GITHUB_REF_NAME#v}"
          gh release upload "$GITHUB_REF_NAME" release/* --clobber
          gh release edit "$GITHUB_REF_NAME" --draft=false --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
